version: '3.8'
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
      - INTERNAL_API_URL=http://backend:5000
      - NEXT_PUBLIC_RAZORPAY_KEY=rzp_test_SYatd0VXxF2Fun
    depends_on:
      - backend
    networks:
      - saas-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '5000:5000'
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/saas
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - RAZORPAY_KEY_ID=rzp_test_SYat0VXxF2Fun
      - RAZORPAY_KEY_SECRET=1diPUky62zPTsuGLDupN4ppu
      - BASE_DOMAIN=yourapp.com
      - FRONTEND_APP_URL=http://localhost:3000
      - MAIL_HOST=smtp
      - MAIL_PORT=587
      - MAIL_SECURE=false
      - MAIL_USER=
      - MAIL_PASS=
      - MAIL_FROM=
    depends_on:
      - mongodb
      - redis
      - minio
    networks:
      - saas-network

  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - saas-network

  mongo-express:
    image: mongo-express:latest
    restart: unless-stopped
    ports:
      - '8081:8081'
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      - mongodb
    networks:
      - saas-network

  redis:
    image: redis:7.2
    restart: unless-stopped
    networks:
      - saas-network

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    networks:
      - saas-network

  nginx:
    image: nginx:stable
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - saas-network

volumes:
  mongo-data:
  minio-data:

networks:
  saas-network:
    driver: bridge
